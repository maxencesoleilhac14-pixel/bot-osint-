{% extends "base.html" %}
{% block title %}Connexion{% endblock %}
{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <h1>🔐 Connexion</h1>
        <form method="POST">
            <div class="form-group"><label>Nom d'utilisateur ou email</label><input type="text" name="username" placeholder="admin" required></div>
            <div class="form-group"><label>Mot de passe</label><input type="password" name="password" placeholder="••••••" required></div>
            <button type="submit" class="btn btn-primary btn-block">Se connecter</button>
        </form>
        <p class="auth-alt">Pas de compte ? <a href="{{ url_for('register') }}">S'inscrire</a></p>
    </div>
</div>
{% endblock %}
