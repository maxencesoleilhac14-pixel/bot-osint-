{% extends "base.html" %}
{% block title %}Inscription{% endblock %}
{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <h1>📝 Inscription</h1>
        <p class="info">{{ free_requests }} recherches gratuites/jour</p>
        <form method="POST">
            <div class="form-group"><label>Nom d'utilisateur</label><input type="text" name="username" placeholder="Ton pseudo" required></div>
            <div class="form-group"><label>Email</label><input type="email" name="email" placeholder="email@exemple.com" required></div>
            <div class="form-group"><label>Mot de passe</label><input type="password" name="password" placeholder="Min 6 caractères" minlength="6" required></div>
            <div class="form-group"><label>Confirmer</label><input type="password" name="confirm_password" placeholder="Retape" required></div>
            <button type="submit" class="btn btn-primary btn-block">Créer mon compte</button>
        </form>
        <p class="auth-alt">Déjà un compte ? <a href="{{ url_for('login') }}">Connexion</a></p>
    </div>
</div>
{% endblock %}
